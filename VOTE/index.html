<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบโหวตชมรมยอดนิยม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- นำเข้า Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" style="font-size: 40px;" href="index.html">Club Vote 2026</a>
            <div>
                <a href="vote.html" class="btn btn-primary me-2">เข้าสู่ระบบโหวต (Vote)</a>
                <a href="total.html" class="btn btn-outline-light">ผลคะแนน (Total)</a>
            </div>
        </div>
    </nav>

    <!-- Hero / Welcome Section -->
    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">ยินดีต้อนรับสู่ Club Popular Vote</h1>
            <p class="lead">ร่วมโหวตชมรมที่คุณชื่นชอบที่สุด 1 สิทธิ์ ต่อ 1 ท่านเท่านั้น</p>
        </div>
    </div>

    <!-- Club Grid -->
    <div class="container mb-5">
        <h3 class="mb-4 text-center fw-bold text-white">รายชื่อชมรมทั้งหมด (41 ชมรม)</h3>
        <div class="row g-4" id="clubContainer">
            <!-- ข้อมูลชมรมจะถูกดึงมาแสดงตรงนี้ด้วย JS -->
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        // ดึงข้อมูลชมรมมาแสดงหน้าแรก
        async function fetchClubs() {
            // แก้คำสั่งจาก supabase.from เป็น db.from
            const { data, error } = await db.from('clubs').select('*').order('id', { ascending: true });
            
            if (error) {
                console.error(error);
                return;
            }

            const container = document.getElementById('clubContainer');
            data.forEach(club => {
                container.innerHTML += `
                    <div class="col-md-6 col-lg-4">
                        <div class="card club-card h-100 shadow-sm">
                            <img src="${club.image_url}" class="card-img-top" alt="${club.name}">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title fw-bold">#${club.id} ${club.name}</h5>
                                <p class="card-text text-muted">${club.description}</p>
                                <a href="vote.html" class="btn btn-outline-primary mt-auto">ไปหน้าโหวต</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        fetchClubs();
    </script>
</body>
</html>
